<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Contact | Sanders Detailing</title>
<link rel="icon" type="images/x-icon" href="images/logo-transparent-svg.svg">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">

<style>
:root { --gold:#ff8410; }

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Bebas Neue',sans-serif;
    background:#0e0e0e;
    color:#eaeaea;
}

/* ================= NAV (UNCHANGED) ================= */

header{
    position:fixed;
    width:100%;
    padding:20px 60px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    background:#111;
    border-bottom:2px solid var(--gold);
    z-index:1000;
}

.hamburger{
    display:none;
    cursor:pointer;
    width:30px;
    height:24px;
    position:relative;
    margin-left:auto;
}

.hamburger span{
    display:block;
    width:100%;
    height:3px;
    background:var(--gold);
    margin:4px 0;
    transition:0.3s;
}

#nav-toggle:checked ~ .hamburger span:nth-child(1){
    transform:rotate(45deg) translate(5px,5px);
}

#nav-toggle:checked ~ .hamburger span:nth-child(2){
    opacity:0;
}

#nav-toggle:checked ~ .hamburger span:nth-child(3){
    transform:rotate(-45deg) translate(7px,-6px);
}

.navigation{
    display:flex;
    gap:10px;
}

.close-btn{
    display:none;
    position:absolute;
    top:20px;
    right:20px;
    font-size:30px;
    color:var(--gold);
    cursor:pointer;
}

#nav-toggle:checked ~ .close-btn{
    display:block;
}

/* NAV LINKS */
.top-schedule{
    padding:12px 40px;
    border:1px solid var(--gold);
    color:var(--gold);
    text-decoration:none;
    transition:.3s;
}

.top-schedule:hover{
    background:var(--gold);
    color:#000;
}

/* ================= SPACING (NO HERO) ================= */

.spacer{
    height:120px;
}

/* ================= FORM ================= */

.section{
    padding:40px 60px 100px;
    text-align:center;
}

.form-container{
    max-width:750px;
    margin:0 auto;
    background:rgba(255,255,255,0.03);
    border:1px solid var(--gold);
    border-radius:18px;
    padding:30px;
    backdrop-filter:blur(12px);
}

.form-title{
    font-size:54px;
    margin-bottom:20px;
    color:var(--gold);
}

/* INPUT FIELDS */
form{
    display:flex;
    flex-direction:column;
    gap:15px;
}

input, textarea{
    padding:12px;
    border-radius:8px;
    border:1px solid rgba(255,132,16,0.4);
    background:#111;
    color:#fff;
    font-size:18px;
    outline:none;
    font-family:'Bebas Neue',sans-serif;
}

textarea{
    height:140px;
    resize:none;
}

input:focus, textarea:focus{
    border-color:var(--gold);
}

/* BUTTON */
.submit-btn{
    padding:14px;
    border:none;
    background:var(--gold);
    color:#000;
    font-size:20px;
    cursor:pointer;
    border-radius:10px;
    transition:.3s;
}

.submit-btn:hover{
    transform:scale(1.03);
}

/* ================= FOOTER ================= */

.social-footer{
    background:#111;
    border-top:1px solid rgba(255, 132, 16, 0.45);
    padding:40px 60px;
    text-align:center;
}

.social-footer .social-icons{
    display:flex;
    justify-content:center;
    gap:14px;
    margin-bottom:14px;
}

.social-footer .social-icons a{
    padding:10px 20px;
    border:1px solid var(--gold);
    color:var(--gold);
    text-decoration:none;
    transition:.2s;
}

.social-footer .social-icons a:hover{
    background:var(--gold);
    color:#000;
}

.social-footer small{
    color:#ccc;
}

/* ================= MOBILE ================= */

@media(max-width:600px){
    .hamburger{display:block;}

    .navigation{
        position:fixed;
        top:0;
        left:0;
        width:100%;
        height:100vh;
        flex-direction:column;
        justify-content:center;
        align-items:center;
        background:#0e0e0e;
        transform:translateY(-100%);
        opacity:0;
        pointer-events:none;
    }

    #nav-toggle:checked ~ .navigation{
        transform:translateY(0);
        opacity:1;
        pointer-events:auto;
    }
}
</style>
</head>

<body>

<header>
    <a href="index.html" class="navbar-brand">
        <img src="images/logo-transparent-svg 3.svg" style="height:40px;">
    </a>

    <input type="checkbox" id="nav-toggle" style="display:none;">

    <label for="nav-toggle" class="hamburger">
        <span></span>
        <span></span>
        <span></span>
    </label>

    <label for="nav-toggle" class="close-btn">&times;</label>

    <nav class="navigation">
        <a href="index.html" class="top-schedule">Home</a>
        <a href="ceramic-coating.html" class="top-schedule">Ceramic Coatings</a>
        <a href="about.html" class="top-schedule">About Us</a>
        <a href="contact.html" class="top-schedule">Contact</a>
        <a href="https://booking.detailermade.com/c5fa5269-9eb9-42df-bb76-4dcd843fd1d5" class="top-schedule">Booking</a>
    </nav>
</header>

<div class="spacer"></div>

<section class="section">

    <div class="form-container">

        <div class="form-title">Contact Us</div>

        <form id="contactForm">

            <input type="text" name="first" placeholder="First Name" required>
            <input type="text" name="last" placeholder="Last Name" required>
            <input type="email" name="email" placeholder="Email" required>
            <input type="tel" name="phone" placeholder="Phone Number" required>

            <textarea name="message" placeholder="Message" required></textarea>

            <button class="submit-btn" type="submit">Send Message</button>

        </form>

    </div>

</section>

<footer class="social-footer">
    <div class="social-icons">
        <a href="https://www.facebook.com/sandersdetailingllc" target="_blank">Facebook</a>
        <a href="https://www.instagram.com/sandersdetailing" target="_blank">Instagram</a>
        <a href="https://www.tiktok.com/@sandersautodetailing" target="_blank">TikTok</a>
    </div>

    <small>
        © 2026 Sanders Detailing. All rights reserved. · Designed by Sanders Detailing
    </small>
</footer>

<script>
document.getElementById("contactForm").addEventListener("submit", async function(e){
    e.preventDefault();

    const data = {
        first: this.first.value,
        last: this.last.value,
        email: this.email.value,
        phone: this.phone.value,
        message: this.message.value
    };

    await fetch("YOUR_GOOGLE_SCRIPT_URL_HERE", {
        method: "POST",
        body: JSON.stringify(data)
    });

    alert("Message sent successfully!");
    this.reset();
});
</script>

</body>
</html>
